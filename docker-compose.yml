services:
  # FlareSolverr sidecar — luôn chạy để sẵn sàng khi trang bị Cloudflare chặn.
  # Khởi động một lần: docker compose up -d flaresolverr
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      LOG_LEVEL: warning
    shm_size: 1g
    restart: unless-stopped
    ports:
      - "8191:8191"

  # CLI crawl chạy theo lệnh (không phải service chạy nền).
  # Ví dụ: docker compose run --rm app crawl add <url>
  app:
    build: .
    profiles: ["cli"]
    environment:
      STORIES_FLARESOLVERR_URL: http://flaresolverr:8191
      STORIES_LIBRARY: /data/library
    volumes:
      # Kho truyện gắn ra host. Đổi vị trí bằng biến STORIES_LIBRARY_HOST
      # (đường dẫn tuyệt đối hoặc tương đối), mặc định ./library cạnh compose.
      - ${STORIES_LIBRARY_HOST:-./library}:/data/library
    depends_on:
      - flaresolverr
